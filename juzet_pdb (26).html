    background-size:340px auto;
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding-bottom:24px;
  }
  @media (min-width:700px){
    body{background-size:460px auto;}
  }
  .tape{
    height:14px;
    background:repeating-linear-gradient(90deg, var(--river) 0 2px, transparent 2px 14px);
    opacity:.35;
  }
  header{
    background:linear-gradient(180deg,#163A40,#12313A);
    color:#EAF2EF;
    padding:20px 16px 22px;
    position:relative;
    overflow:hidden;
    text-align:center;
    transition:background .3s;
  }
  header.admin-mode{
    background:linear-gradient(180deg,#3A5C2E,#294320);
  }
  .header-eyebrow-row{
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:#8FCBB8;
    font-weight:700;
    margin-bottom:12px;
  }
  .header-title-row{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:8px;
    margin-bottom:12px;
  }
  .header-title-row h1{
    margin:0;
    font-family:'Playfair Display', Georgia, serif;
    font-weight:700;
    font-size:26px;
    letter-spacing:.01em;
    justify-self:center;
    white-space:nowrap;
  }
  .header-title-row .icon-btn{justify-self:start;}
  .header-title-row .participants-btn{justify-self:end;}
  .header-status-row{
    font-size:13px;
    color:#B9D4CB;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  .status-dot{
    display:inline-block;width:7px;height:7px;border-radius:50%;
    background:#7CD98E;
    box-shadow:0 0 0 0 rgba(124,217,142,.6);
    animation:pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(124,217,142,.5);}
    70%{box-shadow:0 0 0 7px rgba(124,217,142,0);}
    100%{box-shadow:0 0 0 0 rgba(124,217,142,0);}
  }

  .wrap{max-width:640px;margin:0 auto;padding:16px;}

  .dashboard{display:flex;flex-direction:column;gap:14px;}
  .col-left{order:2;}
  .col-right{order:1;display:flex;flex-direction:column;gap:14px;}
  .col-right .card, .col-right .bigfish{margin-bottom:0;}

  .bigfish{
    background:linear-gradient(135deg,#D98C29,#B5682A);
    color:#FFF8ED;
    border-radius:var(--radius);
    padding:20px 18px;
    margin:0;
    box-shadow:0 6px 18px rgba(181,104,42,.25);
    cursor:pointer;
    text-align:center;
    position:relative;
    overflow:hidden;
    transition:transform .15s ease;
  }
  .bigfish:active{transform:scale(.98);}
  .bigfish.bigfish-flash{animation:bigFishPulse 1.5s ease;}
  @keyframes bigFishPulse{
    0%{box-shadow:0 6px 18px rgba(181,104,42,.25); transform:scale(1);}
    35%{box-shadow:0 10px 32px rgba(217,140,41,.6); transform:scale(1.035);}
    100%{box-shadow:0 6px 18px rgba(181,104,42,.25); transform:scale(1);}
  }
  .bigfish .label{font-size:13px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;opacity:.95;}

<script>
// =========================================================================
// CONFIGURATION FIREBASE — À REMPLIR (voir GUIDE_FIREBASE.md)
// Remplace les valeurs ci-dessous par celles de TON projet Firebase.
// =========================================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyC_0_u1R6kV1vsMOM4LsSj23MSmDBzfiJU",
  authDomain: "juzet-pdb.firebaseapp.com",
  databaseURL: "https://juzet-pdb-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "juzet-pdb",
};
const DB_PATH = "juzet_pdb_2026_data";
// =========================================================================

const SPECIES = {
  perche:    { label:"Perche",     code:"PER", quota:6,    min:150, coeff:1, gender:"f" },
  blackbass: { label:"Black bass", code:"BB",  quota:5,    min:200, coeff:1 },
  brochet:   { label:"Brochet",    code:"BRO", quota:null, min:500, coeff:1 },
  sandre:    { label:"Sandre",     code:"SAN", quota:null, min:400, coeff:1 },
  chevesne:  { label:"Chevesne",   code:"CHE", quota:null, min:200, coeff:1 },
  aspe:      { label:"Aspe",       code:"ASP", quota:null, min:200, coeff:1 },
  mulet:     { label:"Mulet",      code:"MUL", quota:4,    min:400, coeff:1 },
  silure:    { label:"Silure",     code:"SIL", quota:2,    min:800, coeff:0.5 },
};
const SPECIES_ORDER = ["perche","blackbass","brochet","sandre","chevesne","aspe","mulet","silure"];

function defaultSettings(){
  return {
    eventName: "JUZET PDB",
    competitionEnded: false,
    rulesComment: "Pêche du bord uniquement, leurres artificiels, rayon 50km en rivière.",
    bonus2: 200,
    bonus3: 400,
    adminPin: "2026",
    species: {
      perche:    { enabled:true, min:150, quota:6, coeff:1 },
      blackbass: { enabled:true, min:200, quota:5, coeff:1 },
      brochet:   { enabled:true, min:500, quota:0, coeff:1 },
      sandre:    { enabled:true, min:400, quota:0, coeff:1 },
      chevesne:  { enabled:true, min:200, quota:0, coeff:1 },
      aspe:      { enabled:true, min:200, quota:0, coeff:1 },
      mulet:     { enabled:true, min:400, quota:4, coeff:1 },
      silure:    { enabled:true, min:800, quota:2, coeff:0.5 },
    }
  };
}

function mergeState(val){
  const d = defaultSettings();
  const incoming = (val && val.settings) || {};
  const mergedSpecies = {};
  SPECIES_ORDER.forEach(k=>{
    mergedSpecies[k] = { ...d.species[k], ...((incoming.species && incoming.species[k]) || {}) };
  });
  return {
    participants: (val && val.participants) || [],
    catches: (val && val.catches) || [],
    settings: {
      eventName: incoming.eventName || d.eventName,
      competitionEnded: !!incoming.competitionEnded,
      rulesComment: (incoming.rulesComment !== undefined) ? incoming.rulesComment : d.rulesComment,
      bonus2: (incoming.bonus2 !== undefined) ? incoming.bonus2 : d.bonus2,
      bonus3: (incoming.bonus3 !== undefined) ? incoming.bonus3 : d.bonus3,
      adminPin: incoming.adminPin || d.adminPin,
      species: mergedSpecies,
    }
  };
}

// Fusionne les métadonnées fixes (nom, code, genre) avec les réglages modifiables (min/quota/coeff/autorisé)
function cfgFor(key){
  const base = SPECIES[key];
  const override = (state.settings && state.settings.species && state.settings.species[key]) || {};
  const merged = { ...base, ...override };
  if(merged.enabled === undefined) merged.enabled = true; // par défaut : autorisée si l'info manque
  return merged;
}

let state = { participants: [], catches: [], settings: defaultSettings() };
let selectedParticipantId = null;
let selectedSpecies = null;
let lastSyncedAt = null;
let isAdmin = false;
let pendingCelebration = { bigfish:false, podiumPlace:null }; // animations à jouer au retour sur l'accueil (après fermeture du pop-up de résultat)
// Code de secours, câblé dans le fichier lui-même (pas dans Firebase) : permet de toujours
// reprendre la main sur l'appli même si le code stocké dans la base a été modifié par un tiers.
const MASTER_RECOVERY_CODE = "191945";

let dbRef = null;
let firebaseReady = false;
let suppressNextEcho = false;

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function isConfigFilled(){
  return !Object.values(FIREBASE_CONFIG).some(v => String(v).includes("COLLE_TON") || String(v).includes("COLLE_TA"));
}

function initFirebase(){
  if(!isConfigFilled()){
    showConfigError();
    return;
  }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    dbRef = firebase.database().ref(DB_PATH);
    firebaseReady = true;

    dbRef.on('value', (snapshot) => {
      const val = snapshot.val();
      if(suppressNextEcho){ suppressNextEcho = false; return; }
      state = mergeState(val);
      lastSyncedAt = new Date();
      render();
    }, (err) => {
      showToast("⚠️ Connexion à la base impossible — vérifie ta configuration Firebase");
    });
  }catch(e){
    showConfigError();
  }
}

function showConfigError(){
  const app = document.getElementById('app');
  app.innerHTML = `<div class="card" style="border-color:var(--rust);">
    <h2 style="color:var(--rust);">Configuration Firebase manquante</h2>
    <div class="empty-state" style="text-align:left;">
      Ouvre le fichier <code>juzet_pdb.html</code>, trouve le bloc <code>FIREBASE_CONFIG</code> tout en haut du script,
      et remplace les valeurs par celles de ton projet Firebase.<br><br>
      Suis le guide GUIDE_FIREBASE.md fourni avec l'appli, puis republie le fichier sur GitHub Pages.
    </div>
  </div>`;
}

async function saveData(){
  if(!firebaseReady) return;
  try{
    suppressNextEcho = true;
    await dbRef.set(state);
    lastSyncedAt = new Date();
  }catch(e){
    suppressNextEcho = false;
    showToast("⚠️ Échec de sauvegarde, réessaie");
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.classList.remove('show'), 2400);
}

// ---------- Scoring ----------
function computeResults(){
  const results = state.participants.map(p=>{
    const pCatches = state.catches.filter(c=>c.participantId===p.id);
    let total = 0;
    let breakdown = {};
    let distinctCountedSpecies = 0;
    let allValidSizes = [];

    SPECIES_ORDER.forEach(key=>{
      // cfg = réglages ACTUELS de l'espèce. Utilisés pour le quota (plafond global, toujours à jour)
      // et comme valeur de repli pour d'anciennes captures qui n'auraient pas encore de règle figée.
      const cfg = cfgFor(key);
      let list = pCatches.filter(c=>c.species===key).map(c=>({...c}));
      list.sort((a,b)=> b.sizeMm - a.sizeMm);
      list.forEach(c=>{
        // Chaque capture est jugée avec la taille minimale en vigueur AU MOMENT où elle a été enregistrée
        // (verrouillée dans c.ruleMin) : un changement de règle en cours de concours ne modifie jamais
        // rétroactivement une capture déjà validée ou déjà rejetée.
        const effMin = (c.ruleMin !== undefined) ? c.ruleMin : cfg.min;
        c.valid = c.sizeMm >= effMin;
      });
      let eligible = list.filter(c=>c.valid);
      let counted = cfg.quota ? eligible.slice(0, cfg.quota) : eligible;
      const countedIds = new Set(counted.map(c=>c.id));
      list.forEach(c=> c.counted = countedIds.has(c.id));
      const speciesPoints = counted.reduce((s,c)=>{
        // Idem pour le coefficient : verrouillé au moment de la capture (c.ruleCoeff)
        const effCoeff = (c.ruleCoeff !== undefined) ? c.ruleCoeff : cfg.coeff;
        return s + Math.round(c.sizeMm*effCoeff);
      }, 0);
      total += speciesPoints;
      if(counted.length>0) distinctCountedSpecies++;
      counted.forEach(c=> allValidSizes.push(c.sizeMm));
      breakdown[key] = { list, points: speciesPoints };
    });

    const bonus = distinctCountedSpecies>=3 ? state.settings.bonus3 : (distinctCountedSpecies===2 ? state.settings.bonus2 : 0);
    total += bonus;
    const avg = allValidSizes.length ? Math.round(allValidSizes.reduce((a,b)=>a+b,0)/allValidSizes.length) : 0;

    return { ...p, total, bonus, distinctCountedSpecies, breakdown, avg, catchCount: pCatches.length };
  });
  results.sort((a,b)=> b.total - a.total);
  return results;
}

function getBigFish(){
  const valid = state.catches.filter(c=>{
    const cfg = cfgFor(c.species);
    const effMin = (c.ruleMin !== undefined) ? c.ruleMin : cfg.min;
    return c.sizeMm >= effMin;
  });
  if(!valid.length) return null;
  const best = valid.reduce((a,b)=> b.sizeMm > a.sizeMm ? b : a);
  const participant = state.participants.find(p=>p.id===best.participantId);
  return { ...best, participantName: participant ? participant.name : "?" };
}

function buildShareStage(){
  const results = computeResults();
  const top3 = results.slice(0,3);
  const bigFish = getBigFish();

  let html = `<div class="share-cover">
    <div class="share-eyebrow">Concours de pêche du bord</div>
    <h1>${escapeHtml(state.settings.eventName)}</h1>
    <p class="share-thanks">Un grand merci à toutes les pêcheuses et tous les pêcheurs pour leur participation, et à celles et ceux qui ont organisé ce concours pour ce beau week-end de pêche !</p>
    <h2>🏆 Podium</h2>
    <div class="share-podium">` +
    top3.map((r,i)=>{
      const cls = i===0?'gold':i===1?'silver':'bronze';
      return `<div class="share-podium-item"><span class="share-rank ${cls}">${i+1}</span><span class="share-name">${escapeHtml(r.name)}</span><span class="share-pts">${r.total} pts</span></div>`;
    }).join('') +
    `</div>`;

  if(bigFish){
    const sp = SPECIES[bigFish.species];
    html += `<div class="share-bigfish"><strong>🐟 Big Fish</strong>${escapeHtml(bigFish.participantName)} — ${sp.label} ${bigFish.sizeMm}mm</div>`;
  }
  html += `</div>`;

  results.forEach((r, idx)=>{
    html += `<div class="share-player">
      <div class="share-player-header">
        <span class="share-player-rank">#${idx+1}</span>
        <span class="share-player-name">${escapeHtml(r.name)}</span>
        <span class="share-player-pts">${r.total} pts</span>
      </div>
      <div class="share-player-sub">${r.catchCount} capture${r.catchCount>1?'s':''} · ${r.distinctCountedSpecies} espèce${r.distinctCountedSpecies>1?'s':''}${r.bonus?(' · bonus +'+r.bonus):''}</div>
      ${renderDetail(r)}
    </div>`;
  });

  document.getElementById('shareStage').innerHTML = html;
}

async function shareResultsImage(){
  if(!state.participants.length){
    showToast("⚠️ Aucun participant à inclure");
    return;
  }
  if(typeof html2canvas === 'undefined'){
    showToast("⚠️ Génération d'image indisponible (vérifie ta connexion)");
    return;
  }
  showToast("⏳ Génération de l'image...");
  buildShareStage();

  await new Promise(resolve=> setTimeout(resolve, 80)); // laisse le temps au DOM de se mettre en page

  try{
    const stage = document.getElementById('shareStage');
    const canvas = await html2canvas(stage, { backgroundColor:'#ffffff', scale:2, useCORS:true });

    canvas.toBlob(async (blob)=>{
      if(!blob){
        showToast("⚠️ Échec de la génération de l'image");
        return;
      }
      const fileName = `${state.settings.eventName.replace(/[^a-z0-9]+/gi,'_')}_resultats.png`;
      const file = new File([blob], fileName, { type: 'image/png' });

      if(navigator.canShare && navigator.canShare({ files:[file] })){
        try{
          await navigator.share({ files:[file], title: state.settings.eventName, text: `🏆 ${state.settings.eventName} — Résultats finaux` });
        }catch(e){
          // l'utilisateur a annulé le partage, rien à faire
        }
      } else {
        // Repli : ouvrir l'image pour permettre de l'enregistrer/partager manuellement
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(()=> URL.revokeObjectURL(url), 5000);
        showToast("📥 Image téléchargée — tu peux maintenant la partager manuellement");
      }
    }, 'image/png');
  }catch(e){
    showToast("⚠️ Échec de la génération de l'image");
  }
}

// ---------- Rendering ----------
function render(){
  const app = document.getElementById('app');
  const results = computeResults();
  const bigFish = getBigFish();

  const lockBtn = document.getElementById('lockBtn');
  if(lockBtn){
    lockBtn.textContent = isAdmin ? "🔓" : "🔒";
    lockBtn.title = isAdmin ? "Sortir du mode commissaire" : "Passer en mode commissaire";
    lockBtn.setAttribute('aria-label', lockBtn.title);
    lockBtn.classList.toggle('unlocked', isAdmin);
  }

  const fab = document.getElementById('fabFish');
  if(fab){
    fab.classList.toggle('hidden', !isAdmin);
    fab.disabled = state.settings.competitionEnded;
    fab.classList.toggle('disabled', state.settings.competitionEnded);
  }

  const settingsBtn = document.getElementById('settingsBtn');
  if(settingsBtn) settingsBtn.classList.toggle('hidden', !isAdmin);

  const eventTitle = document.getElementById('eventTitle');
  if(eventTitle) eventTitle.textContent = state.settings.eventName;

  const headerEl = document.getElementById('mainHeader');
  if(headerEl) headerEl.classList.toggle('admin-mode', isAdmin);

  const playerCardFishBtn = document.getElementById('playerCardFishBtn');
  if(playerCardFishBtn){
    playerCardFishBtn.classList.toggle('hidden', !isAdmin);
    playerCardFishBtn.disabled = state.settings.competitionEnded;
    playerCardFishBtn.classList.toggle('disabled', state.settings.competitionEnded);
  }

  let html = "";

  if(state.settings.competitionEnded){
    html += `<div class="card final-banner">
      <h2>🏁 Concours terminé</h2>
      <div class="final-sub">Résultats finaux — ${escapeHtml(state.settings.eventName)}</div>
      <div class="final-banner-actions">
        <button class="primary final-share-btn" onclick="shareResultsImage()">📤 Partager les résultats</button>
      </div>
    </div>`;
  }

  html += `<div class="dashboard">
    <div class="col-left">${renderClassementList(results)}</div>
    <div class="col-right">${renderPodium(results)}${renderBigFishCard(bigFish)}</div>
  </div>`;

  // Rules
  const enabledKeys = SPECIES_ORDER.filter(k=>cfgFor(k).enabled);
  html += `<div class="card"><details class="rules"><summary>Règlement</summary>
    <table><thead><tr><th>Espèce</th><th>Mini</th><th>Quota</th><th>Coeff.</th></tr></thead><tbody>
    ${enabledKeys.map(k=>{const c=cfgFor(k); return `<tr><td>${SPECIES[k].label}</td><td>${c.min}mm</td><td>${c.quota||'—'}</td><td>${c.coeff}</td></tr>`}).join('')}
    </tbody></table>
    <p>Points = taille en mm × coefficient de l'espèce. Bonus +${state.settings.bonus2} pts pour 2 espèces différentes maillées, +${state.settings.bonus3} pts pour 3 espèces ou plus.</p>
    ${state.settings.rulesComment ? `<p class="rules-comment">${escapeHtml(state.settings.rulesComment).replace(/\n/g,'<br>')}</p>` : ''}
  </details></div>`;

  html += `<div class="lastsync">${lastSyncedAt ? 'Synchronisé à '+lastSyncedAt.toLocaleTimeString('fr-FR') : ''}</div>`;
  if(isAdmin){
    html += `<div class="footerbar"><button onclick="confirmReset()">Réinitialiser le concours</button></div>`;
  }

  app.innerHTML = html;

  renderParticipantsPanel();
  if(playerCardId) renderPlayerCard();
}

function renderClassementList(results){
  let html = `<div class="card card-standings"><h2>Classement <span class="n">${results.length}</span></h2>`;
  if(!results.length){
    html += `<div class="empty-state">${emptyIllustration()}Ajoute des participants via le bouton 👥 en haut à droite pour démarrer le concours.</div>`;
  } else {
    results.forEach((r, i)=>{
      const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const delay = Math.min(i*0.035, 0.3);
      html += `<div class="row" style="animation-delay:${delay}s" onclick="openPlayerCard('${r.id}')">
        <div class="rank ${rankClass}">${i+1}</div>
        <div class="name">${escapeHtml(r.name)}</div>
        <div class="total">${r.total}</div>
      </div>`;
    });
  }
  html += `</div>`;
  return html;
}

function renderPodium(results){
  const top3 = results.slice(0,3);
  let html = `<div class="card podium-card"><h2>🏆 Podium</h2>`;
  if(!top3.length){
    html += `<div class="empty-state">${emptyIllustration()}Pas encore de classement.</div>`;
  } else {
    html += `<div class="podium">`;
    for(let place=1; place<=3; place++){
      const r = top3[place-1];
      const cls = place===1?'gold':place===2?'silver':'bronze';
      if(!r){
        html += `<div class="podium-slot place-${place} empty"></div>`;
      } else {
        html += `<div class="podium-slot place-${place}" onclick="openPlayerCard('${r.id}')">
          <div class="podium-rank ${cls}">${place}</div>
          <div class="podium-name">${escapeHtml(r.name)}</div>
          <div class="podium-points">${r.total} pts</div>
        </div>`;
      }
    }
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

async function saveSettings(){
  if(!isAdmin) return;
  const newSpecies = {};
  SPECIES_ORDER.forEach(key=>{
    const enabledEl = document.getElementById(`set-${key}-enabled`);
    const minEl = document.getElementById(`set-${key}-min`);
    const quotaEl = document.getElementById(`set-${key}-quota`);
    const coeffEl = document.getElementById(`set-${key}-coeff`);
    const prev = cfgFor(key);
    const min = parseInt(minEl.value, 10);
    const quota = parseInt(quotaEl.value, 10);
    const coeff = parseFloat(coeffEl.value);
    newSpecies[key] = {
      enabled: !!enabledEl.checked,
      min: (Number.isFinite(min) && min>=0) ? min : prev.min,
      quota: (Number.isFinite(quota) && quota>=0) ? quota : (prev.quota||0),
      coeff: (Number.isFinite(coeff) && coeff>0) ? coeff : prev.coeff,
    };
  });

  const nameEl = document.getElementById('set-eventName');
  const newName = nameEl.value.trim();
  const bonus2El = document.getElementById('set-bonus2');
  const bonus3El = document.getElementById('set-bonus3');
  const b2 = parseInt(bonus2El.value, 10);
  const b3 = parseInt(bonus3El.value, 10);
  const commentEl = document.getElementById('set-comment');

  state.settings = {
    eventName: newName || state.settings.eventName,
    competitionEnded: state.settings.competitionEnded,
    rulesComment: commentEl.value.trim(),
    bonus2: Number.isFinite(b2) && b2>=0 ? b2 : state.settings.bonus2,
    bonus3: Number.isFinite(b3) && b3>=0 ? b3 : state.settings.bonus3,
    adminPin: state.settings.adminPin,
    species: newSpecies,
  };
  await saveData();
  closeSettingsPanel();
  render();
  showToast("✅ Réglages enregistrés");
}

async function toggleCompetitionEnded(){
  if(!isAdmin) return;
  const willEnd = !state.settings.competitionEnded;
  if(willEnd){
    const ok = await askConfirm("Marquer le concours comme terminé ? Les résultats finaux seront mis en avant sur l'accueil. Tu pourras rouvrir si besoin.");
    if(!ok) return;
  }
  state.settings.competitionEnded = willEnd;
  await saveData();
  closeSettingsPanel();
  render();
  showToast(willEnd ? "🏁 Concours marqué comme terminé" : "🔓 Concours rouvert");
}

const SPECIES_COLORS = {
  perche:    "#4C7A54",
  blackbass: "#1F6F8B",
  brochet:   "#7B4B94",
  sandre:    "#C98A2B",
  chevesne:  "#B5482A",
  aspe:      "#2F9C95",
  mulet:     "#8C6D46",
  silure:    "#46546B",
};

function renderDetail(r){
  let html = `<div class="detail">`;
  let any = false;
  SPECIES_ORDER.forEach(key=>{
    const b = r.breakdown[key];
    if(b.list.length){
      any = true;
      const s = SPECIES[key];
      const cfg = cfgFor(key);
      const color = SPECIES_COLORS[key];
      const validSizes = b.list.filter(c=>c.valid).map(c=>c.sizeMm);
      const avg = validSizes.length ? Math.round(validSizes.reduce((a,x)=>a+x,0)/validSizes.length) : null;
      const quotaReached = cfg.quota && b.list.filter(c=>c.counted).length >= cfg.quota;
      html += `<div class="species-block" style="border-left-color:${color};">
        <div class="species-block-header">
          <span class="species-dot" style="background:${color};"></span>
          <span class="species-block-title">${s.label}</span>
          ${quotaReached ? '<span class="quota-flag">(quota atteint !)</span>' : ''}
          <span class="species-block-points">${b.points} pts</span>
        </div>
        <div class="catch-list">` +
        b.list.map(c=>{
          const badge = c.counted ? ''
            : (!c.valid ? '<span class="badge small">trop petit</span>' : '<span class="badge outq">hors quota</span>');
          const delBtn = isAdmin ? `<button class="del" onclick="deleteCatch('${c.id}', event)">✕</button>` : '';
          return `<div class="catch-chip"><span class="catch-size">${c.sizeMm} mm</span>${badge}${delBtn}</div>`;
        }).join('') +
        `</div>`;
      if(avg !== null){
        html += `<div class="species-avg">Moyenne ${s.label.toLowerCase()} : ${avg} mm</div>`;
      }
      html += `</div>`;
    }
  });
  if(!any) html += `<div class="empty-state">${emptyIllustration()}Aucune capture enregistrée pour ce pêcheur.</div>`;
  html += `</div>`;
  return html;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

// ---------- Modal helpers (replaces blocked browser confirm/prompt) ----------
let modalResolve = null;
function askConfirm(msg){
  return new Promise(resolve=>{
    modalResolve = resolve;
    document.getElementById('modalMsg').textContent = msg;
    const inp = document.getElementById('modalInput');
    inp.style.display = 'none';
    inp.classList.remove('pin-style');
    document.getElementById('modalOverlay').classList.remove('hidden');
  });
}
function askPin(msg){
  return new Promise(resolve=>{
    modalResolve = resolve;
    document.getElementById('modalMsg').textContent = msg;
    const inp = document.getElementById('modalInput');
    inp.style.display = 'block';
    inp.classList.add('pin-style');
    inp.value = '';
    inp.type = 'text';
    inp.maxLength = 6;
    inp.setAttribute('inputmode','numeric');
    document.getElementById('modalOverlay').classList.remove('hidden');
    setTimeout(()=> inp.focus(), 50);
  });
}
function askText(msg, defaultValue){
  return new Promise(resolve=>{
    modalResolve = resolve;
    document.getElementById('modalMsg').textContent = msg;
    const inp = document.getElementById('modalInput');
    inp.style.display = 'block';
    inp.classList.remove('pin-style');
    inp.type = 'text';
    inp.maxLength = 30;
    inp.removeAttribute('inputmode');
    inp.value = defaultValue || '';
    document.getElementById('modalOverlay').classList.remove('hidden');
    setTimeout(()=>{ inp.focus(); inp.select(); }, 50);
  });
}
function modalConfirm(){
  const inp = document.getElementById('modalInput');
  const value = inp.style.display !== 'none' ? inp.value : true;
  document.getElementById('modalOverlay').classList.add('hidden');
  if(modalResolve) modalResolve(value);
  modalResolve = null;
}
function modalCancel(){
  document.getElementById('modalOverlay').classList.add('hidden');
  if(modalResolve) modalResolve(false);
  modalResolve = null;
}

async function addParticipant(){
  if(!isAdmin) return;
  const input = document.getElementById('newNameInputPanel');
  const name = input.value.trim();
  if(!name) return;
  if(state.participants.some(p=>p.name.toLowerCase()===name.toLowerCase())){
    showToast("⚠️ Ce nom existe déjà");
    return;
  }
  state.participants.push({ id: uid(), name });
  await saveData();
  render();
  showToast(`✅ ${name} ajouté au concours`);
}

async function removeParticipant(id, evt){
  evt.stopPropagation();
  if(!isAdmin) return;
  const p = state.participants.find(x=>x.id===id);
  if(!p) return;
  const ok = await askConfirm(`Retirer ${p.name} et toutes ses captures ? Cette action est définitive.`);
  if(!ok) return;
  state.participants = state.participants.filter(x=>x.id!==id);
  state.catches = state.catches.filter(c=>c.participantId!==id);
  if(selectedParticipantId===id) selectedParticipantId = null;
  await saveData();
  render();
  showToast(`🗑️ ${p.name} retiré du concours`);
}

async function renameParticipant(id, evt){
  evt.stopPropagation();
  if(!isAdmin) return;
  const p = state.participants.find(x=>x.id===id);
  if(!p) return;
  const newName = await askText(`Renommer ${p.name} :`, p.name);
  if(newName === false) return; // annulé
  const trimmed = (newName || '').trim();
  if(!trimmed){ showToast("⚠️ Le nom ne peut pas être vide"); return; }
  if(state.participants.some(x=>x.id!==id && x.name.toLowerCase()===trimmed.toLowerCase())){
    showToast("⚠️ Ce nom existe déjà");
    return;
  }
  const oldName = p.name;
  p.name = trimmed;
  await saveData();
  render();
  showToast(`✅ ${oldName} renommé en ${trimmed}`);
}

// ---------- Assistant "Poisson !" (ajout de capture en 3 étapes) ----------
let wizardStep = 0; // 0 = pêcheur, 1 = espèce, 2 = taille
let wizardSkipParticipant = false; // true quand on entre depuis la fiche joueur (pêcheur déjà connu)

function openCatchWizard(){
  if(!isAdmin || state.settings.competitionEnded) return;
  if(!state.participants.length){
    showToast("⚠️ Ajoute au moins un participant via le bouton 👥 en haut à droite");
    return;
  }
  wizardStep = 0;
  wizardSkipParticipant = false;
  selectedParticipantId = null;
  selectedSpecies = null;
  document.getElementById('catchWizardOverlay').classList.remove('hidden');
  renderCatchWizard();
}

function openCatchWizardForPlayer(participantId){
  if(!isAdmin || state.settings.competitionEnded) return;
  document.getElementById('playerCardOverlay').classList.add('hidden');
  selectedParticipantId = participantId;
  selectedSpecies = null;
  wizardStep = 1;
  wizardSkipParticipant = true;
  document.getElementById('catchWizardOverlay').classList.remove('hidden');
  renderCatchWizard();
}

function closeCatchWizard(){
  document.getElementById('catchWizardOverlay').classList.add('hidden');
  wizardSkipParticipant = false;
}

function wizardBack(){
  if(wizardStep===1 && wizardSkipParticipant) return; // rien avant l'espèce dans ce flux
  if(wizardStep > 0){
    wizardStep--;
    renderCatchWizard();
  }
}

function wizardSelectParticipant(id){
  selectedParticipantId = id;
  wizardStep = 1;
  renderCatchWizard();
}

function wizardSelectSpeciesChoice(key){
  selectedSpecies = key;
  wizardStep = 2;
  renderCatchWizard();
  setTimeout(()=>{
    const el = document.getElementById('wizardSizeInput');
    if(el) el.focus();
  }, 50);
}

function renderCatchWizard(){
  const el = document.getElementById('wizardContent');
  if(!el) return;
  const p = state.participants.find(x=>x.id===selectedParticipantId);
  const s = selectedSpecies ? SPECIES[selectedSpecies] : null;

  const progressParts = [];
  if(p) progressParts.push(escapeHtml(p.name));
  if(s) progressParts.push(s.label);
  let html = progressParts.length ? `<div class="wizard-progress">${progressParts.join(' - ')}</div>` : '';

  if(wizardStep === 0){
    html += `<div class="wizard-title">Qui a pêché ?</div>
      <div class="wizard-list">` +
      state.participants.map(pp=>
        `<div class="wizard-row" onclick="wizardSelectParticipant('${pp.id}')">${escapeHtml(pp.name)}</div>`
      ).join('') +
      `</div>`;
  } else if(wizardStep === 1){
    html += `${wizardSkipParticipant ? '' : '<button class="wizard-back" onclick="wizardBack()">← Retour</button>'}
      <div class="wizard-title">Quel poisson ?</div>
      <div class="speciesgrid">` +
      SPECIES_ORDER.filter(key=>cfgFor(key).enabled).map(key=>{
        const sp = SPECIES[key];
        const color = SPECIES_COLORS[key];
        return `<div class="sp-btn" style="border-left-color:${color};" onclick="wizardSelectSpeciesChoice('${key}')">
          <span class="species-dot" style="background:${color};"></span><span class="lbl">${sp.label}</span>
        </div>`;
      }).join('') + `</div>`;
  } else if(wizardStep === 2){
    html += `<button class="wizard-back" onclick="wizardBack()">← Retour</button>
      <div class="wizard-title">Quelle taille ?</div>
      <input type="number" inputmode="numeric" id="wizardSizeInput" placeholder="Taille en mm" min="0" max="2000" onkeydown="if(event.key==='Enter') wizardSubmit()">
      <button class="primary" style="margin-top:14px;" onclick="wizardSubmit()">Valider la capture</button>`;
  }
  el.innerHTML = html;
}

async function wizardSubmit(){
  if(!isAdmin) return;
  const input = document.getElementById('wizardSizeInput');
  const size = parseInt(input.value, 10);
  if(!size || size<=0){ showToast("⚠️ Entre une taille valide"); return; }
  closeCatchWizard();
  await commitCatch(selectedParticipantId, selectedSpecies, size);
  render();
}

function showResultModal(title, message, milestone){
  // Tout redevient l'accueil derrière ce pop-up : plus de fiche joueur ouverte,
  // pour que le retour (bouton OK) soit toujours simple et cohérent.
  document.getElementById('playerCardOverlay').classList.add('hidden');
  playerCardId = null;

  const modal = document.querySelector('#resultOverlay .modal');
  modal.classList.remove('result-bigfish','result-first','result-podium');
  if(milestone) modal.classList.add('result-'+milestone);
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = message;
  document.getElementById('resultOverlay').classList.remove('hidden');
}
function closeResultModal(){
  document.getElementById('resultOverlay').classList.add('hidden');
  window.scrollTo({ top:0, behavior:'smooth' });

  if(pendingCelebration.bigfish){
    const bfEl = document.querySelector('.bigfish');
    if(bfEl){
      bfEl.classList.add('bigfish-flash');
      setTimeout(()=> bfEl.classList.remove('bigfish-flash'), 1600);
    }
  }
  if(pendingCelebration.podiumPlace){
    const slot = document.querySelector('.podium-slot.place-'+pendingCelebration.podiumPlace);
    if(slot){
      slot.classList.add('podium-flash');
      setTimeout(()=> slot.classList.remove('podium-flash'), 1600);
    }
  }
  pendingCelebration = { bigfish:false, podiumPlace:null };
}

const ORDINALS_FR = ["premier","deuxième","troisième","quatrième","cinquième","sixième","septième","huitième","neuvième","dixième","onzième","douzième","treizième","quatorzième","quinzième","seizième","dix-septième","dix-huitième","dix-neuvième","vingtième"];
function ordinal(n){
  return ORDINALS_FR[n-1] || (n + "e");
}

async function commitCatch(participantId, species, size){
  const cfg = cfgFor(species);
  const p = state.participants.find(x=>x.id===participantId);
  const article = cfg.gender==='f' ? 'la' : 'le';
  const demonstrative = cfg.gender==='f' ? 'Cette' : 'Ce';
  if(!p){
    showToast("⚠️ Ce pêcheur n'existe plus (supprimé entre-temps) — recommence");
    return;
  }
  if(!cfg.enabled){
    showResultModal("Espèce non autorisée", `${cfg.label} n'est plus une espèce autorisée dans ce concours.`);
    return;
  }

  // 1) Trop petit : rejeté d'office, jamais enregistré
  if(size < cfg.min){
    showResultModal("Poisson trop petit !", `Non comptabilisé — taille minimale ${cfg.min}mm pour ${article} ${cfg.label.toLowerCase()}.`);
    return;
  }

  // 2) Quota déjà complet avec des poissons plus gros : rejeté d'office, jamais enregistré
  // Le quota (plafond) utilise toujours le réglage ACTUEL, mais on respecte la règle propre
  // à chaque capture existante (c.ruleMin) pour juger si elle est valide, plutôt que le réglage actuel.
  let replaces = null;
  if(cfg.quota){
    const currentValid = state.catches.filter(c=>{
      if(c.participantId!==participantId || c.species!==species) return false;
      const effMin = (c.ruleMin !== undefined) ? c.ruleMin : cfg.min;
      return c.sizeMm >= effMin;
    });
    if(currentValid.length >= cfg.quota){
      const smallest = currentValid.reduce((a,b)=> b.sizeMm < a.sizeMm ? b : a);
      if(size <= smallest.sizeMm){
        showResultModal("Quota déjà complet !", `${demonstrative} ${cfg.label.toLowerCase()} n'améliore pas le quota (${cfg.quota} déjà atteint avec des poissons plus gros) — non comptabilisé.`);
        return;
      }
      replaces = smallest;
    }
  }

  // Classement avant la capture
  const before = computeResults();
  const oldRank = before.findIndex(x=>x.id===participantId) + 1;
  const oldTotal = (before.find(x=>x.id===participantId) || { total: 0 }).total;
  const bigFishBefore = getBigFish();

  // Enregistrement — on verrouille la taille minimale et le coefficient en vigueur à cet instant précis :
  // un changement de règlement ultérieur ne modifiera jamais cette capture rétroactivement.
  state.catches.push({ id: uid(), participantId, species, sizeMm: size, ts: Date.now(), ruleMin: cfg.min, ruleCoeff: cfg.coeff });
  if(replaces){
    state.catches = state.catches.filter(c=> c.id !== replaces.id);
  }
  await saveData();

  // Classement après la capture
  const after = computeResults();
  const newRank = after.findIndex(x=>x.id===participantId) + 1;
  const newTotal = after.find(x=>x.id===participantId).total;
  const gained = newTotal - oldTotal;
  const bigFishAfter = getBigFish();
  const isNewBigFish = !!(bigFishAfter && bigFishAfter.participantId === participantId && bigFishAfter.sizeMm === size
    && (!bigFishBefore || size > bigFishBefore.sizeMm));

  let msg = `${p.name} gagne ${gained} point${gained>1?'s':''}`;
  if(oldTotal > 0){
    msg += ` et est maintenant à ${newTotal} point${newTotal>1?'s':''}`;
  }
  msg += `.`;
  if(newRank < oldRank){
    msg += ` Il passe ${ordinal(newRank)} !`;
  } else {
    msg += ` Pas de changement dans le classement.`;
  }
  if(replaces){
    msg += ` Il améliore son quota ${cfg.label.toLowerCase()} !`;
  }
  if(isNewBigFish){
    msg += ` 🏆 Nouveau Big Fish du concours !`;
  }

  let milestone = null;
  if(isNewBigFish) milestone = 'bigfish';
  else if(newRank === 1 && oldRank !== 1) milestone = 'first';
  else if(newRank <= 3 && oldRank > 3) milestone = 'podium';

  pendingCelebration.bigfish = isNewBigFish;
  pendingCelebration.podiumPlace = (newRank <= 3 && newRank !== oldRank) ? newRank : null;

  showResultModal("Capture validée !", msg, milestone);
}



async function deleteCatch(id, evt){
  evt.stopPropagation();
  if(!isAdmin) return;
  state.catches = state.catches.filter(c=>c.id!==id);
  await saveData();
  render();
}

async function confirmReset(){
  if(!isAdmin) return;
  const ok = await askConfirm("Réinitialiser tout le concours (participants + captures + règlement) ? Cette action est définitive.");
  if(!ok) return;
  state = { participants: [], catches: [], settings: defaultSettings() };
  await saveData();
  render();
}

// tant que Firebase n'a pas répondu une première fois : c'est ce premier "value"
// qui appelle render() et remplace le squelette par les vraies données.
initFirebase();
